services:
  lapis:
    restart: always
    build: .
    networks:
      - proxynet
      - db1
    volumes:
      - /tmp/lapis_merged:${HOME}
      - ./:/code:ro
      - ./chatsData:/tmp/chats
    ports:
      - 6510:80
networks:
  proxynet:
    name: main
    external: true
  db1:
    name: db1
    external: true

